<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Lamla Quiz Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta property="og:url" content="https://lamla-quiz-hub.netlify.app/404.html">
    <meta property="og:image" content="https://lamla-quiz-hub.netlify.app/img/hero.png">
    <meta property="og:title" content="404 - Page Not Found | Lamla Quiz Hub">
    <meta property="og:description" content="The page you're looking for doesn't exist. Return to Lamla Quiz Hub.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
        :root {
            --bg: #f3ede2;
            --surface: #fff8ee;
            --ink: #17120d;
            --muted: #5e4f42;
            --accent: #145647;
            --accent-2: #b4692a;
            --accent-3: #102e44;
            --border: rgba(38, 29, 21, 0.13);
            --shadow: 0 24px 70px rgba(36, 26, 18, 0.16);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            color: var(--ink);
            font-family: 'IBM Plex Sans', sans-serif;
            background:
                radial-gradient(circle at 8% 10%, rgba(20, 86, 71, 0.2), transparent 34%),
                radial-gradient(circle at 100% 12%, rgba(180, 105, 42, 0.18), transparent 30%),
                linear-gradient(180deg, #fff8ef 0%, #f3ede2 100%);
        }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 14px 16px 56px; }
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            margin-top: 8px;
            background: rgba(255, 248, 238, 0.88);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            box-shadow: 0 8px 30px rgba(40, 30, 20, 0.07);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: var(--ink);
            text-decoration: none;
        }
        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(145deg, var(--accent), var(--accent-3));
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .top-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .menu-toggle {
            display: none;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.66);
            color: var(--ink);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            padding: 0;
        }
        .menu-toggle:hover { transform: translateY(-1px); }
        .btn, .btn-disabled {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 14px;
            padding: 12px 16px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 10px 24px rgba(20, 86, 71, 0.22);
        }
        .btn-secondary { background: transparent; color: var(--ink); }
        .content {
            max-width: 600px;
            margin: 60px auto 0;
            text-align: center;
        }
        .panel {
            background: rgba(255, 250, 242, 0.93);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            padding: 40px 36px;
        }
        .error-code {
            font-family: 'Fraunces', serif;
            font-size: clamp(4rem, 18vw, 8rem);
            line-height: 1;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            line-height: 1.1;
            margin-bottom: 12px;
        }
        .subtitle {
            color: var(--muted);
            line-height: 1.65;
            margin-bottom: 32px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px;
        }
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .nav-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 14px;
        }
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(20, 86, 71, 0.08);
            color: var(--accent);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 600;
            border: 1px solid rgba(20, 86, 71, 0.15);
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .nav-link:hover {
            transform: translateY(-1px);
            background: rgba(20, 86, 71, 0.14);
        }
        @media (max-width: 900px) {
            .wrap { padding: 14px 10px 32px; }
            .topbar { border-radius: 20px; flex-wrap: wrap; }
            .menu-toggle { display: inline-flex; margin-left: auto; }
            .top-actions {
                display: none;
                width: 100%;
                margin-top: 10px;
                flex-direction: column;
                gap: 8px;
            }
            .topbar.menu-open .top-actions { display: flex; }
            .top-actions .btn { width: 100%; justify-content: center; }
        }
        @media (max-width: 480px) {
            .panel { padding: 28px 20px; }
            .actions { flex-direction: column; }
            .actions .btn { width: 100%; }
            .content { margin-top: 32px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header class="topbar">
            <a class="brand" href="index.html">
                <span class="brand-mark">LQ</span>
                <span>Lamla Quiz Hub</span>
            </a>
            <button class="menu-toggle" id="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="top-actions">☰</button>
            <div class="top-actions" id="top-actions">
                <a class="btn-secondary btn" href="Electronics/index.html">Electronics</a>
                <a class="btn-secondary btn" href="Literature/index.html">Literature</a>
                <a class="btn-secondary btn" href="operating-systems/index.html">Operating Systems</a>
                <a class="btn-secondary btn" href="https://lamla-ai.vercel.app" target="_blank" rel="noopener noreferrer">Visit Lamla AI</a>
            </div>
        </header>

        <div class="content">
            <div class="panel">
                <div class="error-code">404</div>
                <h1>Page Not Found</h1>
                <p class="subtitle">The page you're looking for doesn't exist or may have moved.<br>Let's get you back on track.</p>

                <div class="actions">
                    <a href="index.html" class="btn btn-primary">Back to home</a>
                    <button class="btn btn-secondary" onclick="history.back()">Go back</button>
                </div>

                <hr class="divider">

                <p class="nav-label">Browse quiz categories</p>
                <div class="nav-links">
                    <a href="Electronics/index.html" class="nav-link">Electronics</a>
                    <a href="Literature/index.html" class="nav-link">Literature</a>
                    <a href="operating-systems/index.html" class="nav-link">Operating Systems</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const topbar = document.querySelector('.topbar');
        const menuToggle = document.getElementById('menu-toggle');
        const menuLinks = document.querySelectorAll('#top-actions a');

        function closeMenu() {
            topbar.classList.remove('menu-open');
            menuToggle.setAttribute('aria-expanded', 'false');
            menuToggle.textContent = '☰';
            menuToggle.setAttribute('aria-label', 'Open menu');
        }

        function openMenu() {
            topbar.classList.add('menu-open');
            menuToggle.setAttribute('aria-expanded', 'true');
            menuToggle.textContent = '✕';
            menuToggle.setAttribute('aria-label', 'Close menu');
        }

        menuToggle.addEventListener('click', () => {
            topbar.classList.contains('menu-open') ? closeMenu() : openMenu();
        });

        menuLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (window.matchMedia('(max-width: 900px)').matches) closeMenu();
            });
        });

        window.addEventListener('resize', () => {
            if (!window.matchMedia('(max-width: 900px)').matches) closeMenu();
        });
    </script>
</body>
</html>
